<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="LifeOS — Personal lifestyle hub for nutrition, fitness, and self-care routines">
    <title>LifeOS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body>
    <div id="app">
        <!-- ===== HEADER ===== -->
        <header id="app-header">
            <div class="header-left">
                <h1 id="header-title">Today</h1>
                <p id="header-date" class="header-date"></p>
            </div>
            <div class="header-right">
                <div id="header-xp-bar" class="header-xp-bar">
                    <div id="header-xp-fill" class="header-xp-fill"></div>
                </div>
                <div id="header-level" class="level-badge">
                    <span class="level-icon">⚡</span>
                    <span id="level-text" class="level-text">Lvl 1</span>
                </div>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <main id="main-content">
            <!-- Dashboard -->
            <section id="section-dashboard" class="app-section active">
                <div id="dashboard-progress" class="dashboard-block"></div>
            </section>

            <!-- Food / Nutrition -->
            <section id="section-food" class="app-section">
                <div id="food-today" class="section-block"></div>
                <div id="food-shopping" class="section-block"></div>
                <div id="food-supplements" class="section-block"></div>
                <div id="food-library" class="section-block"></div>
            </section>

            <!-- Sport -->
            <section id="section-sport" class="app-section">
                <div id="sport-today" class="section-block"></div>
                <div id="sport-timer-container" class="section-block"></div>
                <div id="sport-analytics" class="section-block"></div>
                <div id="sport-weekly" class="section-block"></div>
                <div id="sport-exercises" class="section-block"></div>
            </section>

            <!-- Bodycare -->
            <section id="section-bodycare" class="app-section">
                <div id="bodycare-morning" class="section-block"></div>
                <div id="bodycare-evening" class="section-block"></div>
            </section>

            <!-- Calendar -->
            <section id="section-calendar" class="app-section">
                <div id="calendar-container" class="section-block"></div>
            </section>

            <!-- Chat / Assistant -->
            <section id="section-chat" class="app-section" style="height:100%; padding-bottom:70px;">
                <div style="display:flex; flex-direction:column; height:100%;">
                    <div id="chat-messages" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;"></div>
                    <div id="chat-suggestions" style="padding: 0 16px 8px 16px; display:flex; gap:8px; overflow-x:auto; white-space:nowrap; scrollbar-width:none;">
                        <button onclick="document.getElementById('chat-input').value = this.innerText; document.getElementById('chat-input').focus();" style="font-size:0.75rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:8px 14px; color:var(--text); cursor:pointer; transition:background 0.2s;">Wie würdest du meine Gesundheit auf Basis meiner Sportroutine und Essensgewohnheiten beurteilen?</button>
                        <button onclick="document.getElementById('chat-input').value = this.innerText; document.getElementById('chat-input').focus();" style="font-size:0.75rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:8px 14px; color:var(--text); cursor:pointer; transition:background 0.2s;">Was sollte ich heute noch essen, um meine Ziele zu erreichen?</button>
                        <button onclick="document.getElementById('chat-input').value = this.innerText; document.getElementById('chat-input').focus();" style="font-size:0.75rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:8px 14px; color:var(--text); cursor:pointer; transition:background 0.2s;">Fasse mir kurz zusammen, was heute alles ansteht.</button>
                    </div>
                    <div id="chat-input-area" class="glass-card-sm" style="margin:0 16px 16px 16px; padding:12px; display:flex; gap:8px;">
                        <textarea id="chat-input" class="form-input" style="flex:1; min-height:40px; max-height:120px; resize:none; padding:10px;" placeholder="Ask about your data..."></textarea>
                        <button id="btn-chat-send" class="btn btn-primary" style="align-self:flex-end; padding:10px 16px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Todo -->
            <section id="section-todo" class="app-section">
                <div id="todo-container" class="section-block"></div>
            </section>

            <!-- Mail -->
            <section id="section-mail" class="app-section">
                <div id="mail-container" class="section-block"></div>
            </section>

            <!-- Settings -->
            <section id="section-settings" class="app-section">
                <div id="settings-container" class="section-block"></div>
            </section>
        </main>

        <!-- ===== BOTTOM NAV ===== -->
        <nav id="bottom-nav">
            <button class="nav-btn" data-section="food" id="nav-food">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 010 8h-1"/>
                    <path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>
                    <line x1="6" y1="1" x2="6" y2="4"/>
                    <line x1="10" y1="1" x2="10" y2="4"/>
                    <line x1="14" y1="1" x2="14" y2="4"/>
                </svg>
                <span class="nav-label">Food</span>
            </button>
            <button class="nav-btn" data-section="sport" id="nav-sport">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a14.5 14.5 0 000 20 14.5 14.5 0 000-20"/>
                    <path d="M2 12h20"/>
                </svg>
                <span class="nav-label">Sport</span>
            </button>
            <button class="nav-btn" data-section="bodycare" id="nav-bodycare">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <span class="nav-label">Care</span>
            </button>
            <button class="nav-btn" data-section="chat" id="nav-chat">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="nav-label" data-i18n="nav_chat">Chat</span>
            </button>
            <div class="nav-today-wrapper">
                <button class="nav-btn-today active" data-section="dashboard" id="nav-dashboard">
                    <svg class="nav-icon-today" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                </button>
            </div>
            <button class="nav-btn" data-section="todo" id="nav-todo">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
                <span class="nav-label">Todo</span>
            </button>
            <button class="nav-btn" data-section="mail" id="nav-mail">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span class="nav-label">Mail</span>
            </button>
            <button class="nav-btn" data-section="calendar" id="nav-calendar">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="nav-label" data-i18n="nav_calendar">Calendar</span>
            </button>
            <button class="nav-btn" data-section="settings" id="nav-settings">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span class="nav-label" data-i18n="nav_settings">Settings</span>
            </button>
        </nav>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="modal-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- ===== REST TIMER OVERLAY ===== -->
    <div id="timer-overlay" class="timer-overlay hidden">
        <div class="timer-container">
            <h2 class="timer-title">Rest Timer</h2>
            <div class="timer-circle-wrap">
                <svg class="timer-svg" viewBox="0 0 200 200">
                    <circle class="timer-track" cx="100" cy="100" r="88"/>
                    <circle id="timer-progress" class="timer-ring" cx="100" cy="100" r="88"
                        stroke-dasharray="553"
                        stroke-dashoffset="0"/>
                </svg>
                <div class="timer-display">
                    <span id="timer-minutes">03</span><span class="timer-colon">:</span><span id="timer-seconds">00</span>
                </div>
            </div>
            <div class="timer-set-row">
                <button id="timer-decrease" class="timer-adj-btn" aria-label="Decrease 30s">− 30 s</button>
                <span id="timer-duration-label" class="timer-duration-label">3:00</span>
                <button id="timer-increase" class="timer-adj-btn" aria-label="Increase 30s">+ 30 s</button>
            </div>
            <div class="timer-controls">
                <button id="timer-start" class="timer-main-btn">Start</button>
                <button id="timer-reset" class="timer-secondary-btn">Reset</button>
            </div>
            <button id="timer-close" class="timer-close-btn">Close</button>
        </div>
    </div>

    <!-- ===== TOAST NOTIFICATIONS ===== -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/i18n.js"></script>
    <script src="js/food.js"></script>
    <script src="js/sport.js"></script>
    <script src="js/bodycare.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/rag.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/mail.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
